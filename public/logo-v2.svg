<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgB" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E1B4B"/>
      <stop offset="100%" stop-color="#312E81"/>
    </linearGradient>
    <linearGradient id="textB" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A5B4FC"/>
      <stop offset="50%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <linearGradient id="lineB" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="30%" stop-color="#6366F1"/>
      <stop offset="70%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <radialGradient id="glowB" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4F46E5" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#1E1B4B" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="512" height="512" rx="108" fill="url(#bgB)"/>
  <rect width="512" height="512" rx="108" fill="url(#glowB)"/>
  <rect x="1.5" y="1.5" width="509" height="509" rx="107" fill="none"
        stroke="rgba(99,102,241,0.4)" stroke-width="2"/>

  <!-- 顶部装饰点 -->
  <circle cx="256" cy="108" r="4" fill="#6366F1" opacity="0.6"/>
  <circle cx="236" cy="108" r="2.5" fill="#6366F1" opacity="0.3"/>
  <circle cx="276" cy="108" r="2.5" fill="#6366F1" opacity="0.3"/>

  <!-- V 字母 -->
  <path d="M 100 168 L 200 368 L 256 240 L 312 368 L 412 168"
        fill="none" stroke="url(#textB)" stroke-width="44"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 底部渐变线 -->
  <rect x="80" y="400" width="352" height="3" rx="1.5" fill="url(#lineB)"/>

  <!-- 底部小字 CAMP -->
  <text x="256" y="448" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif"
        font-size="42" font-weight="700" letter-spacing="12"
        fill="#6366F1" opacity="0.7">CAMP</text>
</svg>
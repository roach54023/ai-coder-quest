<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>扫码点餐系统</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif; background: #f5f5f5; width: 390px; min-height: 700px; }
  .header { background: #fff; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #eee; }
  .logo { font-size: 16px; font-weight: 700; color: #ff4d4f; }
  .table-tag { background: #fff7e6; color: #fa8c16; font-size: 12px; padding: 3px 10px; border-radius: 20px; border: 1px solid #ffd591; }
  .banner { background: linear-gradient(135deg, #ff4d4f, #ff7a45); padding: 16px; color: #fff; }
  .banner h2 { font-size: 18px; font-weight: 700; }
  .banner p { font-size: 12px; opacity: 0.85; margin-top: 4px; }
  .category-bar { background: #fff; display: flex; overflow-x: auto; border-bottom: 1px solid #f0f0f0; }
  .cat { padding: 10px 16px; font-size: 13px; color: #666; white-space: nowrap; cursor: pointer; }
  .cat.active { color: #ff4d4f; border-bottom: 2px solid #ff4d4f; font-weight: 600; }
  .menu-list { padding: 8px 12px; }
  .item { background: #fff; border-radius: 10px; padding: 12px; margin-bottom: 8px; display: flex; gap: 10px; align-items: center; }
  .item-img { width: 64px; height: 64px; border-radius: 8px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 32px; background: #fff8f0; }
  .item-info { flex: 1; }
  .item-name { font-size: 14px; font-weight: 600; color: #222; }
  .item-desc { font-size: 11px; color: #999; margin-top: 2px; }
  .item-sales { font-size: 11px; color: #bbb; margin-top: 2px; }
  .item-bottom { display: flex; align-items: center; justify-content: space-between; margin-top: 6px; }
  .price { color: #ff4d4f; font-size: 16px; font-weight: 700; }
  .price span { font-size: 11px; }
  .add-btn { width: 26px; height: 26px; background: #ff4d4f; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 18px; line-height: 1; }
  .cart-bar { background: #222; padding: 10px 16px; display: flex; align-items: center; gap: 12px; border-radius: 0 0 12px 12px; }
  .cart-icon { width: 40px; height: 40px; background: #ff4d4f; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; position: relative; flex-shrink: 0; }
  .cart-badge { position: absolute; top: -4px; right: -4px; background: #fadb14; color: #222; font-size: 10px; font-weight: 700; width: 16px; height: 16px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
  .cart-info { flex: 1; }
  .cart-total { color: #ff4d4f; font-size: 16px; font-weight: 700; }
  .cart-hint { color: #888; font-size: 11px; }
  .order-btn { background: #ff4d4f; color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 14px; font-weight: 600; white-space: nowrap; }
  .tag { display: inline-block; background: #fff1f0; color: #ff4d4f; font-size: 10px; padding: 1px 5px; border-radius: 3px; margin-left: 4px; }
</style>
</head>
<body>
<div class="header">
  <div class="logo">好味道餐厅</div>
  <div class="table-tag">3号桌</div>
</div>
<div class="banner">
  <h2>今日特惠，满50减10</h2>
  <p>新品上线 · 招牌菜 · 限时优惠</p>
</div>
<div class="category-bar">
  <div class="cat active">招牌菜</div>
  <div class="cat">热菜</div>
  <div class="cat">凉菜</div>
  <div class="cat">主食</div>
  <div class="cat">饮品</div>
</div>
<div class="menu-list">
  <div class="item">
    <div class="item-img">🍜</div>
    <div class="item-info">
      <div class="item-name">招牌红烧肉<span class="tag">热销</span></div>
      <div class="item-desc">精选五花肉，入口即化，秘制酱汁</div>
      <div class="item-sales">月售 328 份</div>
      <div class="item-bottom">
        <div class="price"><span>¥</span>38</div>
        <div class="add-btn">+</div>
      </div>
    </div>
  </div>
  <div class="item">
    <div class="item-img">🥘</div>
    <div class="item-info">
      <div class="item-name">番茄牛腩煲<span class="tag">新品</span></div>
      <div class="item-desc">澳洲进口牛腩，慢炖3小时</div>
      <div class="item-sales">月售 156 份</div>
      <div class="item-bottom">
        <div class="price"><span>¥</span>48</div>
        <div class="add-btn">+</div>
      </div>
    </div>
  </div>
  <div class="item">
    <div class="item-img">🍗</div>
    <div class="item-info">
      <div class="item-name">脆皮烤鸡腿</div>
      <div class="item-desc">现烤现卖，外脆里嫩</div>
      <div class="item-sales">月售 89 份</div>
      <div class="item-bottom">
        <div class="price"><span>¥</span>28</div>
        <div class="add-btn">+</div>
      </div>
    </div>
  </div>
</div>
<div class="cart-bar">
  <div class="cart-icon">🛒<div class="cart-badge">2</div></div>
  <div class="cart-info">
    <div class="cart-total">¥66.00</div>
    <div class="cart-hint">还差 ¥4 享满减</div>
  </div>
  <div class="order-btn">去结算</div>
</div>
</body>
</html>

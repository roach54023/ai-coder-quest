<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>客户跟进CRM</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif; background: #f8fafc; width: 960px; min-height: 600px; }
  .sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: 200px; background: #1e293b; padding: 20px 0; }
  .sidebar-logo { padding: 0 20px 20px; font-size: 16px; font-weight: 700; color: #fff; border-bottom: 1px solid #334155; }
  .sidebar-logo span { color: #38bdf8; }
  .menu-item { padding: 10px 20px; font-size: 13px; color: #94a3b8; cursor: pointer; display: flex; align-items: center; gap: 8px; }
  .menu-item.active { background: #0f172a; color: #fff; border-right: 2px solid #38bdf8; }
  .menu-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
  .main { margin-left: 200px; padding: 24px; }
  .toprow { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .page-title { font-size: 20px; font-weight: 700; color: #1e293b; }
  .add-btn { background: #0ea5e9; color: #fff; border: none; padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
  .stat-card { background: #fff; border-radius: 10px; padding: 16px; border: 1px solid #e2e8f0; }
  .stat-label { font-size: 12px; color: #94a3b8; }
  .stat-num { font-size: 24px; font-weight: 700; color: #1e293b; margin-top: 4px; }
  .stat-change { font-size: 11px; color: #22c55e; margin-top: 2px; }
  .table-wrap { background: #fff; border-radius: 10px; border: 1px solid #e2e8f0; overflow: hidden; }
  .table-header { padding: 14px 16px; border-bottom: 1px solid #f1f5f9; display: flex; align-items: center; justify-content: space-between; }
  .table-title { font-size: 14px; font-weight: 600; color: #1e293b; }
  .filter-row { display: flex; gap: 8px; }
  .filter-btn { font-size: 12px; padding: 4px 10px; border-radius: 6px; border: 1px solid #e2e8f0; background: #fff; color: #64748b; cursor: pointer; }
  .filter-btn.active { background: #eff6ff; color: #2563eb; border-color: #bfdbfe; }
  table { width: 100%; border-collapse: collapse; }
  th { padding: 10px 16px; text-align: left; font-size: 12px; color: #94a3b8; font-weight: 500; border-bottom: 1px solid #f1f5f9; }
  td { padding: 12px 16px; font-size: 13px; color: #374151; border-bottom: 1px solid #f8fafc; }
  tr:last-child td { border-bottom: none; }
  .avatar { width: 28px; height: 28px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: #fff; margin-right: 8px; }
  .status { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 500; }
  .s-hot { background: #fef2f2; color: #ef4444; }
  .s-follow { background: #eff6ff; color: #2563eb; }
  .s-wait { background: #f0fdf4; color: #16a34a; }
  .s-cold { background: #f8fafc; color: #94a3b8; }
  .progress-bar { height: 4px; background: #f1f5f9; border-radius: 2px; width: 80px; }
  .progress-fill { height: 100%; border-radius: 2px; background: #0ea5e9; }
  .action-btn { font-size: 12px; color: #0ea5e9; cursor: pointer; }
</style>
</head>
<body>
<div class="sidebar">
  <div class="sidebar-logo">Sales<span>CRM</span></div>
  <div class="menu-item active"><div class="menu-dot"></div>客户列表</div>
  <div class="menu-item"><div class="menu-dot"></div>跟进记录</div>
  <div class="menu-item"><div class="menu-dot"></div>商机管理</div>
  <div class="menu-item"><div class="menu-dot"></div>数据报表</div>
  <div class="menu-item"><div class="menu-dot"></div>团队成员</div>
</div>
<div class="main">
  <div class="toprow">
    <div class="page-title">客户管理</div>
    <button class="add-btn">+ 新增客户</button>
  </div>
  <div class="stats">
    <div class="stat-card">
      <div class="stat-label">本月新增客户</div>
      <div class="stat-num">47</div>
      <div class="stat-change">↑ 23% 较上月</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">跟进中</div>
      <div class="stat-num">128</div>
      <div class="stat-change">↑ 8% 较上月</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">本月成交</div>
      <div class="stat-num">¥84,200</div>
      <div class="stat-change">↑ 31% 较上月</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">转化率</div>
      <div class="stat-num">18.4%</div>
      <div class="stat-change">↑ 2.1% 较上月</div>
    </div>
  </div>
  <div class="table-wrap">
    <div class="table-header">
      <div class="table-title">客户列表</div>
      <div class="filter-row">
        <div class="filter-btn active">全部</div>
        <div class="filter-btn">热门</div>
        <div class="filter-btn">跟进中</div>
        <div class="filter-btn">待签约</div>
      </div>
    </div>
    <table>
      <thead>
        <tr>
          <th>客户名称</th>
          <th>状态</th>
          <th>最近跟进</th>
          <th>成交概率</th>
          <th>负责人</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td><span class="avatar" style="background:#6366f1">张</span>张总 · 某科技公司</td>
          <td><span class="status s-hot">热门</span></td>
          <td>今天 14:30</td>
          <td><div class="progress-bar"><div class="progress-fill" style="width:85%"></div></div></td>
          <td>王建国</td>
          <td><span class="action-btn">记录跟进</span></td>
        </tr>
        <tr>
          <td><span class="avatar" style="background:#0ea5e9">李</span>李总 · 某贸易公司</td>
          <td><span class="status s-follow">跟进中</span></td>
          <td>昨天 16:00</td>
          <td><div class="progress-bar"><div class="progress-fill" style="width:60%"></div></div></td>
          <td>王建国</td>
          <td><span class="action-btn">记录跟进</span></td>
        </tr>
        <tr>
          <td><span class="avatar" style="background:#22c55e">陈</span>陈总 · 某制造企业</td>
          <td><span class="status s-wait">待签约</span></td>
          <td>3天前</td>
          <td><div class="progress-bar"><div class="progress-fill" style="width:92%"></div></div></td>
          <td>王建国</td>
          <td><span class="action-btn">记录跟进</span></td>
        </tr>
        <tr>
          <td><span class="avatar" style="background:#f59e0b">刘</span>刘总 · 某餐饮集团</td>
          <td><span class="status s-cold">待激活</span></td>
          <td>2周前</td>
          <td><div class="progress-bar"><div class="progress-fill" style="width:20%"></div></div></td>
          <td>王建国</td>
          <td><span class="action-btn">记录跟进</span></td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
</body>
</html>

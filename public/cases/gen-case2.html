<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI简历优化工具</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif; background: #0f0f1a; color: #fff; width: 900px; min-height: 600px; }
  .topbar { background: #1a1a2e; border-bottom: 1px solid #2a2a4a; padding: 0 24px; height: 52px; display: flex; align-items: center; justify-content: space-between; }
  .brand { font-size: 18px; font-weight: 700; background: linear-gradient(90deg, #7c3aed, #2563eb); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .nav { display: flex; gap: 24px; font-size: 13px; color: #888; }
  .nav span { cursor: pointer; }
  .nav span.active { color: #fff; }
  .badge { background: #7c3aed22; color: #a78bfa; font-size: 11px; padding: 2px 8px; border-radius: 20px; border: 1px solid #7c3aed44; }
  .main { display: grid; grid-template-columns: 1fr 1fr; gap: 0; height: calc(100% - 52px); }
  .panel { padding: 24px; }
  .panel-left { border-right: 1px solid #2a2a4a; }
  .panel-title { font-size: 13px; color: #888; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .panel-title .dot { width: 6px; height: 6px; border-radius: 50%; background: #7c3aed; }
  textarea { width: 100%; height: 200px; background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 8px; padding: 12px; color: #ccc; font-size: 13px; line-height: 1.6; resize: none; outline: none; font-family: inherit; }
  .jd-input { width: 100%; background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 8px; padding: 10px 12px; color: #ccc; font-size: 13px; outline: none; margin-bottom: 12px; font-family: inherit; }
  .btn { background: linear-gradient(135deg, #7c3aed, #2563eb); color: #fff; border: none; padding: 10px 24px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; width: 100%; margin-top: 8px; }
  .score-row { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
  .score-circle { width: 56px; height: 56px; border-radius: 50%; background: conic-gradient(#7c3aed 0% 82%, #2a2a4a 82% 100%); display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 700; flex-shrink: 0; position: relative; }
  .score-circle::before { content: ''; position: absolute; width: 44px; height: 44px; border-radius: 50%; background: #0f0f1a; }
  .score-num { position: relative; z-index: 1; }
  .score-info h3 { font-size: 15px; font-weight: 600; }
  .score-info p { font-size: 12px; color: #888; margin-top: 2px; }
  .suggest-list { display: flex; flex-direction: column; gap: 8px; }
  .suggest-item { background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 8px; padding: 10px 12px; }
  .suggest-item.good { border-color: #16a34a44; background: #16a34a0a; }
  .suggest-item.warn { border-color: #d9770644; background: #d977060a; }
  .suggest-item.bad { border-color: #dc262644; background: #dc26260a; }
  .suggest-tag { font-size: 10px; padding: 1px 6px; border-radius: 4px; margin-right: 6px; font-weight: 600; }
  .tag-good { background: #16a34a22; color: #4ade80; }
  .tag-warn { background: #d9770622; color: #fb923c; }
  .tag-bad { background: #dc262622; color: #f87171; }
  .suggest-text { font-size: 12px; color: #ccc; margin-top: 4px; line-height: 1.5; }
  .stats-row { display: flex; gap: 12px; margin-bottom: 16px; }
  .stat { flex: 1; background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 8px; padding: 10px; text-align: center; }
  .stat-num { font-size: 20px; font-weight: 700; color: #a78bfa; }
  .stat-label { font-size: 11px; color: #666; margin-top: 2px; }
</style>
</head>
<body>
<div class="topbar">
  <div class="brand">ResumeAI</div>
  <div class="nav">
    <span class="active">优化简历</span>
    <span>历史记录</span>
    <span>模板库</span>
  </div>
  <div class="badge">Beta</div>
</div>
<div class="main">
  <div class="panel panel-left">
    <div class="panel-title"><div class="dot"></div>粘贴你的简历</div>
    <textarea placeholder="将你的简历内容粘贴到这里...

例如：
姓名：张三
工作经历：
2022-2024 某公司 产品经理
负责产品规划和需求分析...">姓名：林晓雯
工作经历：
2021-2024 某互联网公司 HR
- 负责招聘工作，每年招聘50+人
- 管理员工档案和入离职手续
- 组织团建活动

教育背景：
2017-2021 某大学 人力资源管理</textarea>
    <div class="panel-title" style="margin-top:16px"><div class="dot" style="background:#2563eb"></div>目标职位描述（可选）</div>
    <input class="jd-input" placeholder="粘贴目标职位的JD，AI会针对性优化..." value="高级HR，要求有数据分析能力，熟悉HRBP模式">
    <button class="btn">AI 一键优化简历</button>
  </div>
  <div class="panel">
    <div class="stats-row">
      <div class="stat"><div class="stat-num">82</div><div class="stat-label">匹配分</div></div>
      <div class="stat"><div class="stat-num">+34%</div><div class="stat-label">面试率提升</div></div>
      <div class="stat"><div class="stat-num">3</div><div class="stat-label">待优化项</div></div>
    </div>
    <div class="panel-title"><div class="dot" style="background:#2563eb"></div>AI 优化建议</div>
    <div class="suggest-list">
      <div class="suggest-item good">
        <span class="suggest-tag tag-good">优势</span>
        <div class="suggest-text">工作经历时间连贯，无空窗期，HR 背景与目标职位高度匹配</div>
      </div>
      <div class="suggest-item warn">
        <span class="suggest-tag tag-warn">建议</span>
        <div class="suggest-text">「负责招聘工作」改为「主导全年招聘计划，完成 52 人招聘目标，平均到岗周期缩短 18%」——用数字说话更有说服力</div>
      </div>
      <div class="suggest-item bad">
        <span class="suggest-tag tag-bad">缺失</span>
        <div class="suggest-text">JD 要求数据分析能力，但简历中未体现。建议补充：「使用 Excel/飞书多维表格搭建招聘漏斗数据看板」</div>
      </div>
      <div class="suggest-item warn">
        <span class="suggest-tag tag-warn">建议</span>
        <div class="suggest-text">「组织团建活动」价值感低，建议改为「设计并落地季度员工满意度调研，推动 2 项福利政策改善」</div>
      </div>
    </div>
  </div>
</div>
</body>
</html>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgC" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3730A3"/>
      <stop offset="100%" stop-color="#6D28D9"/>
    </linearGradient>
    <radialGradient id="glowC" cx="55%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#818CF8" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#3730A3" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="rocketC" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E0E7FF"/>
    </linearGradient>
    <linearGradient id="flameC" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="100%" stop-color="#F97316" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="108" fill="url(#bgC)"/>
  <rect width="512" height="512" rx="108" fill="url(#glowC)"/>
  <rect x="1.5" y="1.5" width="509" height="509" rx="107" fill="none"
        stroke="rgba(255,255,255,0.15)" stroke-width="3"/>

  <!-- 轨迹线（左下到右上） -->
  <line x1="120" y1="392" x2="256" y2="256" stroke="#6366F1" stroke-width="2.5"
        stroke-dasharray="8 6" opacity="0.5"/>
  <line x1="160" y1="392" x2="296" y2="256" stroke="#6366F1" stroke-width="2"
        stroke-dasharray="6 8" opacity="0.3"/>

  <!-- 火焰 -->
  <ellipse cx="256" cy="370" rx="22" ry="36" fill="url(#flameC)" opacity="0.9"/>
  <ellipse cx="256" cy="375" rx="12" ry="22" fill="#FDE68A" opacity="0.7"/>

  <!-- 火箭主体 -->
  <path d="M 256 88
           C 256 88 196 148 188 248
           L 188 320 L 256 348 L 324 320
           L 324 248
           C 316 148 256 88 256 88 Z"
        fill="url(#rocketC)"/>

  <!-- 火箭头部高光 -->
  <path d="M 256 88 C 256 88 228 130 224 180 L 256 160 Z"
        fill="rgba(255,255,255,0.35)"/>

  <!-- 左翼 -->
  <path d="M 188 280 L 140 340 L 188 320 Z"
        fill="#C7D2FE"/>
  <!-- 右翼 -->
  <path d="M 324 280 L 372 340 L 324 320 Z"
        fill="#C7D2FE"/>

  <!-- 窗口 -->
  <circle cx="256" cy="220" r="28" fill="#1E1B4B" opacity="0.8"/>
  <circle cx="256" cy="220" r="20" fill="#4338CA" opacity="0.6"/>
  <circle cx="248" cy="213" r="7" fill="rgba(255,255,255,0.5)"/>
</svg>
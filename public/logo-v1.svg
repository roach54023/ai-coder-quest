<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- 主渐变：紫蓝 -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <!-- 内发光 -->
    <radialGradient id="glow" cx="50%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#818CF8" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#4F46E5" stop-opacity="0"/>
    </radialGradient>
    <!-- 闪电渐变 -->
    <linearGradient id="bolt" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#C7D2FE"/>
    </linearGradient>
    <!-- 代码符号渐变 -->
    <linearGradient id="code" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#A5B4FC"/>
      <stop offset="100%" stop-color="#818CF8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#4F46E5" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- 圆角方形底 -->
  <rect x="0" y="0" width="512" height="512" rx="112" ry="112" fill="url(#bg)" filter="url(#shadow)"/>
  <!-- 内发光层 -->
  <rect x="0" y="0" width="512" height="512" rx="112" ry="112" fill="url(#glow)"/>
  <!-- 顶部高光边 -->
  <rect x="1" y="1" width="510" height="510" rx="111" ry="111" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>

  <!-- 闪电主体 -->
  <path d="M 290 80 L 210 272 L 268 272 L 222 432 L 380 220 L 310 220 L 360 80 Z"
        fill="url(#bolt)" opacity="0.95"/>

  <!-- 左侧 < 符号 -->
  <path d="M 148 200 L 96 256 L 148 312"
        fill="none" stroke="url(#code)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>

  <!-- 右侧 > 符号 -->
  <path d="M 364 200 L 416 256 L 364 312"
        fill="none" stroke="url(#code)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
</svg>
